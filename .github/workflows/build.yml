name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear estructura de carpetas
        run: |
          mkdir -p app/src/main/java/com/edgevolume
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

      - name: Mover archivos a sus carpetas correctas
        run: |
          cp AndroidManifest.xml       app/src/main/AndroidManifest.xml
          cp MainActivity.kt           app/src/main/java/com/edgevolume/MainActivity.kt
          cp EdgeVolumeService.kt      app/src/main/java/com/edgevolume/EdgeVolumeService.kt
          cp activity_main.xml         app/src/main/res/layout/activity_main.xml
          cp card_bg.xml               app/src/main/res/drawable/card_bg.xml
          cp colors.xml                app/src/main/res/values/colors.xml
          cp strings.xml               app/src/main/res/values/strings.xml
          cp themes.xml                app/src/main/res/values/themes.xml
          cp gradle-wrapper.properties gradle/wrapper/gradle-wrapper.properties
          cp proguard-rules.pro        app/proguard-rules.pro
          cp build.gradle.kts          app/build.gradle.kts

      - name: Crear iconos de la app
        run: |
          python3 - << 'PYEOF'
          import os, struct, zlib

          def make_png(w, h, r, g, b):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              raw = b''
              for _ in range(h):
                  raw += b'\x00' + bytes([r, g, b, 255] * w)
              compressed = zlib.compress(raw)
              png  = b'\x89PNG\r\n\x1a\n'
              png += chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
              png += chunk(b'IDAT', compressed)
              png += chunk(b'IEND', b'')
              return png

          sizes = {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144}
          icon = None
          for folder, size in sizes.items():
              os.makedirs(f'app/src/main/res/{folder}', exist_ok=True)
              icon = make_png(size, size, 76, 142, 255)
              open(f'app/src/main/res/{folder}/ic_launcher.png', 'wb').write(icon)
              open(f'app/src/main/res/{folder}/ic_launcher_round.png', 'wb').write(icon)
          PYEOF

      - name: Crear build.gradle.kts raiz
        run: |
          printf 'plugins {\n    id("com.android.application") version "8.2.2" apply false\n    id("org.jetbrains.kotlin.android") version "1.9.22" apply false\n}\n' > build.gradle.kts

      - name: Descargar gradle-wrapper.jar
        run: |
          wget -q "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -O gradle/wrapper/gradle-wrapper.jar

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Permiso de ejecucion a gradlew
        run: chmod +x gradlew

      - name: Compilar APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: EdgeVolume-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
